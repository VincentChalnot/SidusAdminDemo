; Prod-oriented php.ini overrides for the frankenphp_prod build stage.
; Loaded from PHP_INI_SCAN_DIR=":${PHP_INI_DIR}/app.conf.d" on top of
; php.ini-production (see frankenphp/Dockerfile).

[PHP]
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED
log_errors = On
memory_limit = 256M
post_max_size = 64M
upload_max_filesize = 64M

[Date]
date.timezone = 'Europe/Paris'

[opcache]
opcache.enable = 1
; Cache is baked into the image at build time (no bind-mounted source in
; prod); never re-stat files on disk for changes.
opcache.validate_timestamps = 0
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16
opcache.jit = tracing
opcache.jit_buffer_size = 128M

[apcu]
apc.enable_cli = 0
