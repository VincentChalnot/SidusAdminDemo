; Dev-oriented php.ini overrides for the frankenphp_dev build stage.
; Loaded from PHP_INI_SCAN_DIR=":${PHP_INI_DIR}/app.conf.d" on top of
; php.ini-development (see frankenphp/Dockerfile).

[PHP]
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
memory_limit = -1
post_max_size = 64M
upload_max_filesize = 64M

[Date]
date.timezone = 'Europe/Paris'

[opcache]
opcache.enable = 1
; Recompile changed files immediately instead of waiting for the prod TTL.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.max_accelerated_files = 20000

[apcu]
apc.enable_cli = 1
