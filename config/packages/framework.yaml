framework:
    secret: '%env(APP_SECRET)%'

    # Traefik terminates TLS and forwards plain HTTP with X-Forwarded-* headers;
    # without this, url_generator/asset()/the debug toolbar all assume http://,
    # producing mixed-content requests on an https:// page.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    php_errors:
        log: true
