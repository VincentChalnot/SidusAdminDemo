security:
    # This demo is intentionally public: no user provider, no authenticator, no access control.
    providers:
        in_memory:
            memory: null

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: in_memory

    # No access_control rules: every route is publicly reachable.
    access_control: []
